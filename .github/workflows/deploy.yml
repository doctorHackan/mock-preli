name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: crm-ticket-api

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build the Docker image and push to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Make the package public so EC2 can pull without credentials.
      # Uses the GitHub API — requires a PAT with packages:write if the
      # repo is private, but for public repos GITHUB_TOKEN works.
      - name: Make package public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PACKAGE=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          curl -sf -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/user/packages/container/${PACKAGE}/versions" \
            || echo "Note: Set package visibility to public manually in GitHub if this step fails."

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to EC2 by pulling the public image
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR="/home/${{ secrets.EC2_USERNAME }}/crm-ticket-sorting-api"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Write the .env file from secrets (overwrite on every deploy)
            cat > .env <<EOF
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            GITHUB_REPOSITORY=${{ github.repository }}
            EOF

            # Write the compose file from the repo (already copied by prior SCP or inline)
            cat > docker-compose.yml <<'COMPOSE'
            services:
              api:
                image: ghcr.io/${GITHUB_REPOSITORY}:latest
                container_name: crm-ticket-api
                restart: unless-stopped
                ports:
                  - "80:8000"
                env_file:
                  - .env
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 10s
            COMPOSE

            echo "▶ Pulling latest image..."
            docker compose pull

            echo "▶ Restarting service..."
            docker compose up -d --remove-orphans

            echo "▶ Waiting for health check..."
            sleep 8
            curl -sf http://localhost:80/health && echo " ✅ Healthy" || echo " ⚠️  Health check failed"
